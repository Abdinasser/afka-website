<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Afka — Quote social card</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; background: #f4f8f9; }
  .stage { position: absolute; top: 50%; left: 50%; width: 1080px; height: 1080px; transform-origin: center center; }

  .card {
    position: relative; width: 1080px; height: 1080px; padding: 96px;
    box-sizing: border-box; overflow: hidden;
    background: var(--afka-cloud-white); color: var(--fg);
    display: flex; flex-direction: column;
  }

  /* One graphic gesture: halftone arc in the top-right, same dot motif as the logo halo */
  .halo {
    position: absolute; top: -180px; right: -180px;
    width: 760px; height: 760px;
    background-image: radial-gradient(circle, rgba(10,92,107,0.35) 0 4.5px, transparent 6px);
    background-size: 38px 38px;
    -webkit-mask-image: radial-gradient(circle at 100% 0%, black 0%, black 30%, transparent 68%);
            mask-image: radial-gradient(circle at 100% 0%, black 0%, black 30%, transparent 68%);
    opacity: 0.75;
    pointer-events: none;
  }

  /* Oversized background quote glyph, low contrast, anchored bottom-left */
  .glyph {
    position: absolute; left: 30px; bottom: -180px; z-index: 0;
    font-family: var(--serif); font-style: italic; font-weight: 400;
    font-size: 780px; line-height: 0.7; color: var(--accent);
    opacity: 0.08; user-select: none;
  }

  .top { position: relative; z-index: 2; display: flex; align-items: center; justify-content: space-between; }
  .wordmark { height: 78px; width: auto; }
  .ref { font-size: 18px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); }

  .quote-wrap {
    position: relative; z-index: 2;
    margin: auto 0;
    padding-top: 60px;
  }
  blockquote {
    margin: 0;
    font-family: var(--serif); font-style: italic; font-weight: 400;
    font-size: 96px; line-height: 1.04; letter-spacing: -0.022em;
    color: var(--fg); text-wrap: balance; max-width: 15ch;
  }

  .attr-row { position: relative; z-index: 2; display: flex; align-items: center; gap: 18px; margin-top: 60px; }
  .attr-row .rule { width: 64px; height: 1px; background: var(--accent); }
  .attr-row .text { font-family: var(--sans); font-size: 22px; font-weight: 500; letter-spacing: 0.04em; color: var(--fg); }
  .attr-row .text span { color: var(--fg-muted); font-weight: 400; }

  .foot {
    position: relative; z-index: 2;
    display: flex; justify-content: space-between; align-items: center;
    margin-top: auto; padding-top: 36px;
    font-size: 20px; color: var(--fg-muted);
  }
  .foot .socials { display: flex; gap: 14px; align-items: center; color: var(--accent); }
  .foot .socials svg { display: block; }
  .foot .handle { font-family: var(--mono); font-size: 20px; letter-spacing: 0.06em; color: var(--accent); margin-right: 14px; }
  .foot .right-group { display: flex; align-items: center; }
</style>
<script>
  function fit() {
    const s = document.querySelector('.stage');
    if (!s) return;
    const k = Math.min(window.innerWidth / 1080, window.innerHeight / 1080);
    s.style.transform = `translate(-50%, -50%) scale(${k})`;
  }
  window.addEventListener('DOMContentLoaded', fit);
  window.addEventListener('resize', fit);
  fit();
</script>
</head>
<body>
<div class="stage">
  <div class="card">
    <div class="halo"></div>
    <div class="glyph">“</div>

    <div class="top">
      <img class="wordmark" src="../assets/afka-wordmark-black.png" alt="Afka Digital Institute" />
      <span class="ref">Founding Brief</span>
    </div>

    <div class="quote-wrap">
      <blockquote>Digital harm is a question of language, trust, safety, and public knowledge.</blockquote>
    </div>

    <div class="attr-row">
      <span class="rule"></span>
      <span class="text">Afka Founding Brief <span>· 2026</span></span>
    </div>

    <div class="foot">
      <span>afkadigital.org</span>
      <div class="right-group">
        <span class="handle">@afkadigital</span>
        <div class="socials" aria-label="Afka on social">
        <svg width="28" height="28" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="4" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="12" r="3.4" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="16.7" cy="7.3" r="1" fill="currentColor"/></svg>
        <svg width="28" height="28" viewBox="0 0 24 24"><path fill="currentColor" d="M5.2 9.4h3.1v9.4H5.2zM6.8 5.2a1.8 1.8 0 1 1 0 3.6 1.8 1.8 0 0 1 0-3.6ZM11 9.4h3v1.3c.5-.8 1.5-1.6 3.1-1.6 2.2 0 3.7 1.4 3.7 4.3v5.4h-3.1v-5c0-1.4-.5-2.2-1.7-2.2-1.1 0-1.8.8-1.8 2.2v5H11z"/></svg>
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="m5 5 10.8 14h3.2L8.2 5zm0 14 6.2-6.2M13.1 11 19 5"/></svg>
        <svg width="28" height="28" viewBox="0 0 24 24"><path fill="currentColor" d="M14 8.2h2.3V5.4A14.5 14.5 0 0 0 13.5 5c-2.8 0-4.7 1.7-4.7 4.8v2.4H6v3.1h2.8V20h3.4v-4.7h3l.5-3.1h-3.5V10c0-1 .3-1.8 1.8-1.8Z"/></svg>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
