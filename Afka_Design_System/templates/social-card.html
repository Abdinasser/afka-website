<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Afka — Social card (square)</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; background: #0d1f22; }
  .stage { position: absolute; top: 50%; left: 50%; width: 1080px; height: 1080px; transform-origin: center center; }
  .card { position: relative; width: 1080px; height: 1080px; padding: 96px; box-sizing: border-box; background: var(--afka-deep-ink); color: var(--fg-inverse); display: flex; flex-direction: column; overflow: hidden; }
  /* Atmospheric */
  .card::before {
    content:""; position:absolute; inset:0;
    background:
      radial-gradient(ellipse at 92% 12%, rgba(10,92,107,0.5), transparent 36rem),
      radial-gradient(ellipse at 8% 100%, rgba(200,232,237,0.06), transparent 32rem),
      linear-gradient(160deg, rgba(13,31,34,0.98), rgba(10,92,107,0.85) 55%, rgba(13,31,34,0.98));
  }
  .card::after {
    content:""; position:absolute; inset:0;
    background-image: radial-gradient(circle, rgba(244,248,249,0.18) 0 1.2px, transparent 1.55px);
    background-size: 28px 28px;
    -webkit-mask-image: linear-gradient(180deg, rgba(13,31,34,1) 0%, transparent 70%);
            mask-image: linear-gradient(180deg, rgba(13,31,34,1) 0%, transparent 70%);
    opacity: 0.6;
  }
  .card > * { position: relative; z-index: 1; }

  .top { display: flex; align-items: center; justify-content: space-between; }
  .wordmark { height: 84px; width: auto; }
  .meta { font-family: var(--mono); font-size: 22px; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(244,248,249,0.62); }

  .series { margin-top: 96px; display: inline-flex; gap: 18px; align-items: center; font-size: 22px; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--afka-mist-blue); }
  .series .dash { width: 60px; height: 2px; background: var(--afka-mist-blue); }

  .title { margin-top: 32px; font-family: var(--display); font-weight: 500; font-size: 124px; line-height: 0.94; letter-spacing: -0.042em; text-wrap: balance; max-width: 14ch; color: #FFFFFF; font-variation-settings: "opsz" 96; }
  .sub   { margin-top: 40px; font-size: 30px; line-height: 1.4; color: rgba(244,248,249,0.86); max-width: 24ch; }

  .spacer { flex: 1; }
  .foot { display: flex; align-items: center; justify-content: space-between; padding-top: 28px; border-top: 1px solid rgba(244,248,249,0.18); font-size: 22px; color: rgba(244,248,249,0.62); }
  .foot .socials { display: flex; gap: 14px; align-items: center; }
  .foot .socials svg { color: rgba(244,248,249,0.86); }
  .foot .handle { font-family: var(--mono); font-size: 20px; letter-spacing: 0.06em; color: rgba(244,248,249,0.86); margin-right: 14px; }
  .foot .right-group { display: flex; align-items: center; }
</style>
<script>
  function fit() {
    const s = document.querySelector('.stage');
    if (!s) return;
    const k = Math.min(window.innerWidth / 1080, window.innerHeight / 1080);
    s.style.transform = `translate(-50%, -50%) scale(${k})`;
  }
  window.addEventListener('DOMContentLoaded', fit);
  window.addEventListener('resize', fit);
  fit();
</script>
</head>
<body>
  <div class="stage">
  <div class="card">
    <div class="top">
      <img class="wordmark" src="../assets/afka-wordmark-light.png" alt="Afka Digital Institute" />
      <span class="meta">Research Note · 03</span>
    </div>

    <div class="series"><span class="dash"></span><span>New Brief</span></div>
    <h1 class="title">Who hears the appeal, in which language?</h1>
    <p class="sub">A Somali‑language case file on how takedown appeals are read, ignored, or quietly closed.</p>

    <div class="spacer"></div>
    <div class="foot">
      <span>afkadigital.org</span>
      <div class="right-group">
        <span class="handle">@afkadigital</span>
        <div class="socials" aria-label="Afka on social">
        <svg width="30" height="30" viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="4" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="12" r="3.4" fill="none" stroke="currentColor" stroke-width="1.8"/><circle cx="16.7" cy="7.3" r="1" fill="currentColor"/></svg>
        <svg width="30" height="30" viewBox="0 0 24 24"><path fill="currentColor" d="M5.2 9.4h3.1v9.4H5.2zM6.8 5.2a1.8 1.8 0 1 1 0 3.6 1.8 1.8 0 0 1 0-3.6ZM11 9.4h3v1.3c.5-.8 1.5-1.6 3.1-1.6 2.2 0 3.7 1.4 3.7 4.3v5.4h-3.1v-5c0-1.4-.5-2.2-1.7-2.2-1.1 0-1.8.8-1.8 2.2v5H11z"/></svg>
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="m5 5 10.8 14h3.2L8.2 5zm0 14 6.2-6.2M13.1 11 19 5"/></svg>
        <svg width="30" height="30" viewBox="0 0 24 24"><path fill="currentColor" d="M14 8.2h2.3V5.4A14.5 14.5 0 0 0 13.5 5c-2.8 0-4.7 1.7-4.7 4.8v2.4H6v3.1h2.8V20h3.4v-4.7h3l.5-3.1h-3.5V10c0-1 .3-1.8 1.8-1.8Z"/></svg>
        </div>
      </div>
    </div>
  </div>
  </div>
</body>
</html>
