<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Afka — Stat module</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px 28px; background: var(--bg); font-family: var(--sans); }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; border-top: 1px solid var(--line-soft); border-bottom: 1px solid var(--line-soft); }
  .stat { padding: 22px 22px; border-left: 1px solid var(--line-soft); }
  .stat:first-child { border-left: 0; }
  .value { font-family: var(--serif); font-weight: 500; font-size: 44px; line-height: 1; color: var(--fg); letter-spacing: -0.01em; }
  .unit { display: inline-block; margin-left: 6px; font-family: var(--sans); font-size: 16px; font-weight: 500; color: var(--fg-quiet); }
  .label { margin-top: 14px; font-size: 11.5px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); }
  .note { margin-top: 6px; font-size: 12px; line-height: 1.55; color: var(--fg-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="stat">
      <div class="value">37<span class="unit">cases</span></div>
      <div class="label">Documented</div>
      <div class="note">Public Somali‑language moderation incidents, 2024–2026.</div>
    </div>
    <div class="stat">
      <div class="value">4<span class="unit">platforms</span></div>
      <div class="label">Studied</div>
      <div class="note">Major surfaces with active Somali‑language audiences.</div>
    </div>
    <div class="stat">
      <div class="value">82<span class="unit">%</span></div>
      <div class="label">Unappealable</div>
      <div class="note">Of takedown decisions reviewed in the Founding Brief sample.</div>
    </div>
  </div>
</body>
</html>
