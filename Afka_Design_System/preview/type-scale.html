<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Afka — Type scale</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px 28px; background: var(--bg); font-family: var(--sans); }
  .row { display: grid; grid-template-columns: 64px 1fr; align-items: baseline; gap: 14px; padding: 6px 0; border-top: 1px solid var(--line-soft); }
  .row:first-child { border-top: 0; }
  .meta { font-family: var(--mono); font-size: 10px; color: var(--fg-quiet); letter-spacing: 0.04em; text-transform: uppercase; }
  .smp { color: var(--fg); }
  .s56 { font-family: var(--serif); font-weight:500; font-size: 40px; line-height: 1.05; }
  .s36 { font-family: var(--serif); font-weight:500; font-size: 28px; line-height: 1.1; }
  .s24 { font-family: var(--serif); font-weight:500; font-size: 22px; line-height: 1.2; }
  .s19 { font-family: var(--sans); font-weight:400; font-size: 17px; line-height: 1.5; }
  .s16 { font-family: var(--sans); font-weight:400; font-size: 15px; line-height: 1.55; }
  .s13 { font-family: var(--sans); font-weight:400; font-size: 13px; line-height: 1.5; color: var(--fg-muted); }
  .s11 { font-family: var(--sans); font-weight:600; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); }
</style>
</head>
<body>
  <div class="row"><span class="meta">56/1.05</span><span class="smp s56">Evidence.</span></div>
  <div class="row"><span class="meta">36/1.10</span><span class="smp s36">Why Afka exists</span></div>
  <div class="row"><span class="meta">24/1.20</span><span class="smp s24">Platform Accountability</span></div>
  <div class="row"><span class="meta">19/1.65</span><span class="smp s19">Independent research on platform power.</span></div>
  <div class="row"><span class="meta">16/1.70</span><span class="smp s16">Documenting cases, analysing platform behaviour.</span></div>
  <div class="row"><span class="meta">13/1.50</span><span class="smp s13">Source: Afka Founding Brief, 2026.</span></div>
  <div class="row"><span class="meta">11/eyebrow</span><span class="smp s11">Research focus</span></div>
</body>
</html>
