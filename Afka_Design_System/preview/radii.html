<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Afka — Radii</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--bg); font-family: var(--sans); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .shape { width: 64px; height: 64px; background: var(--afka-paper); border: 1px solid var(--line); }
  .tok { font-family: var(--mono); font-size: 11px; color: var(--fg); }
  .px  { font-family: var(--mono); font-size: 10px; color: var(--fg-quiet); }
  .role { font-family: var(--sans); font-size: 11px; color: var(--fg-muted); text-align: center; max-width: 12ch; line-height: 1.35; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="shape" style="border-radius: 0;"></div><div class="tok">--r-none</div><div class="px">0</div><div class="role">Cards, surfaces, reports</div></div>
    <div class="item"><div class="shape" style="border-radius: 2px;"></div><div class="tok">--r-xs</div><div class="px">2px</div><div class="role">Editorial cards</div></div>
    <div class="item"><div class="shape" style="border-radius: 6px;"></div><div class="tok">--r-md</div><div class="px">6px</div><div class="role">Form inputs</div></div>
    <div class="item"><div class="shape" style="border-radius: 12px;"></div><div class="tok">--r-lg</div><div class="px">12px</div><div class="role">Rare — mobile menu</div></div>
    <div class="item"><div class="shape" style="border-radius: 9999px;"></div><div class="tok">--r-pill</div><div class="px">∞</div><div class="role">CTAs, badges, nav</div></div>
  </div>
</body>
</html>
