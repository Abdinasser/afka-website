<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Afka — Pull quote</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 32px; background: var(--bg); font-family: var(--sans); }
  .pullquote {
    border-left: 2px solid var(--accent);
    padding: 6px 0 6px 22px;
    font-family: var(--serif);
    font-style: italic;
    font-weight: 400;
    font-size: 28px;
    line-height: 1.18;
    color: var(--fg);
    margin: 0;
    max-width: 36ch;
  }
  cite { display:block; margin-top: 18px; font-style: normal; font-family: var(--sans); font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--fg-quiet); }
</style>
</head>
<body>
  <blockquote class="pullquote">
    Digital harm is not only a technology issue. It is a question of language, trust, safety, livelihoods, and public knowledge.
    <cite>Afka Founding Brief · 2026</cite>
  </blockquote>
</body>
</html>
