<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Afka — Eyebrow & mono</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 28px 32px; background: var(--bg); font-family: var(--sans); }
  .row { display: flex; flex-direction: column; gap: 18px; }
  .meta { font-family: var(--mono); font-size: 10px; color: var(--fg-quiet); letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 5px; }
  .eyebrow { font-family: var(--sans); font-size: 11.5px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); }
  .mono { font-family: var(--mono); font-size: 13px; color: var(--fg-muted); }
  .index { display: inline-flex; min-width: 2.6rem; align-items:center; justify-content:center; border-bottom: 1px solid var(--accent); padding-bottom: 6px; color: var(--accent); font-family: var(--sans); font-size: 11.5px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div>
      <div class="meta">Eyebrow · Plex 600 · 11.5 · uppercase · letter-spacing 0.08em</div>
      <span class="eyebrow">Research focus</span>
    </div>
    <div>
      <div class="meta">Surface index · numeric eyebrow with rule</div>
      <span class="index">01</span>
    </div>
    <div>
      <div class="meta">Mono · IBM Plex Mono 400 · 13</div>
      <span class="mono">DOI: 10.0000 / afka.brief.2026.001 · Reviewed 2026‑03‑12</span>
    </div>
  </div>
</body>
</html>
