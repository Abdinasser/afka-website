<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Afka — Floating pill nav</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 60px 24px; background: var(--bg-dark); font-family: var(--sans); position: relative; overflow: hidden; min-height: 220px; }
  body::before { content:""; position:absolute; inset:0; background-image: radial-gradient(circle, rgba(10,92,107,0.62) 0 1.35px, transparent 1.65px), radial-gradient(circle, rgba(244,248,249,0.18) 0 1px, transparent 1.4px); background-position: 0 0, 9px 9px; background-size: 18px 18px; opacity: .5; pointer-events:none; }
  .nav { position: relative; display: flex; align-items: center; gap: 16px; padding: 8px 16px 8px 14px; border-radius: 9999px; border: 1px solid rgba(244,248,249,0.12); background: rgba(13,31,34,0.72); box-shadow: 0 22px 70px rgba(13,31,34,0.22); backdrop-filter: blur(20px); width: fit-content; margin: 0 auto; min-height: 56px; }
  .wordmark { height: 28px; }
  .links { display: flex; gap: 4px; }
  .link { padding: 8px 16px; font-size: 13px; font-weight: 500; color: rgba(244,248,249,0.68); border-radius: 9999px; cursor: pointer; }
  .link.active { background: rgba(244,248,249,0.1); color: var(--fg-inverse); }
  .link:hover { background: rgba(244,248,249,0.08); color: var(--fg-inverse); }
</style>
</head>
<body>
  <nav class="nav">
    <img src="../assets/afka-wordmark-light.png" alt="Afka" class="wordmark" />
    <div class="links">
      <span class="link active">About</span>
      <span class="link">Research</span>
      <span class="link">Insights</span>
      <span class="link">Contact</span>
    </div>
  </nav>
</body>
</html>
