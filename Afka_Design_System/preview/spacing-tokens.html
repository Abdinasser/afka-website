<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Afka — Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px 28px; background: var(--bg); font-family: var(--sans); }
  .row { display: grid; grid-template-columns: 70px 1fr 60px; align-items: center; gap: 14px; padding: 5px 0; }
  .tok { font-family: var(--mono); font-size: 11px; color: var(--fg); }
  .bar { height: 10px; background: var(--accent); }
  .px { font-family: var(--mono); font-size: 10px; color: var(--fg-quiet); text-align: right; }
</style>
</head>
<body>
  <div class="row"><span class="tok">--s-1</span><div class="bar" style="width: 4px;"></div><span class="px">4 px</span></div>
  <div class="row"><span class="tok">--s-2</span><div class="bar" style="width: 8px;"></div><span class="px">8 px</span></div>
  <div class="row"><span class="tok">--s-3</span><div class="bar" style="width: 12px;"></div><span class="px">12 px</span></div>
  <div class="row"><span class="tok">--s-4</span><div class="bar" style="width: 16px;"></div><span class="px">16 px</span></div>
  <div class="row"><span class="tok">--s-6</span><div class="bar" style="width: 24px;"></div><span class="px">24 px</span></div>
  <div class="row"><span class="tok">--s-8</span><div class="bar" style="width: 32px;"></div><span class="px">32 px</span></div>
  <div class="row"><span class="tok">--s-12</span><div class="bar" style="width: 48px;"></div><span class="px">48 px</span></div>
  <div class="row"><span class="tok">--s-16</span><div class="bar" style="width: 64px;"></div><span class="px">64 px</span></div>
  <div class="row"><span class="tok">--s-24</span><div class="bar" style="width: 96px;"></div><span class="px">96 px</span></div>
  <div class="row"><span class="tok">--s-32</span><div class="bar" style="width: 128px;"></div><span class="px">128 px</span></div>
</body>
</html>
