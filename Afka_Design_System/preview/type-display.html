<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Afka — Display type</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 28px 32px; background: var(--bg); }
  .stack > * + * { margin-top: 18px; }
  .meta { font-family: var(--mono); font-size: 10px; color: var(--fg-quiet); letter-spacing: 0.04em; text-transform: uppercase; }
  .d1 { font-family: var(--display); font-weight: 500; font-size: 62px; line-height: 0.96; letter-spacing: -0.038em; color: var(--fg); margin: 0; font-variation-settings: "opsz" 96; }
  .d2 { font-family: var(--display); font-weight: 500; font-size: 38px; line-height: 1.02; letter-spacing: -0.028em; color: var(--fg); margin: 0; font-variation-settings: "opsz" 72; }
  .d3 { font-family: var(--display); font-weight: 500; font-size: 24px; line-height: 1.15; letter-spacing: -0.02em; color: var(--fg); margin: 0; font-variation-settings: "opsz" 36; }
</style>
</head>
<body>
  <div class="stack">
    <div>
      <div class="meta">Display XL · Bricolage Grotesque 500 · opsz 96 · 62 / 0.96</div>
      <p class="d1">Evidence for Somali digital futures.</p>
    </div>
    <div>
      <div class="meta">Display LG · Bricolage Grotesque 500 · opsz 72 · 38 / 1.02</div>
      <p class="d2">Why Afka exists</p>
    </div>
    <div>
      <div class="meta">Display MD · Bricolage Grotesque 500 · opsz 36 · 24 / 1.15</div>
      <p class="d3">Platform Accountability</p>
    </div>
  </div>
</body>
</html>
