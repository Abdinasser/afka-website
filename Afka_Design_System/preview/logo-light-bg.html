<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Afka — Logo on light</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 220px; padding: 24px; font-family: var(--sans); }
  .stack { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .logo { width: 240px; height: auto; display: block; }
  .label { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fg-quiet); text-align: center; }
</style>
</head>
<body>
  <div class="stack">
    <img class="logo" src="../assets/afka-wordmark-black.png" alt="Afka Digital Institute" />
    <span class="label">Primary lockup · teal on cloud white</span>
  </div>
</body>
</html>
