<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Afka — Motion</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 22px 28px; background: var(--bg); font-family: var(--sans); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .item { border: 1px solid var(--line-soft); padding: 14px 16px; background: var(--afka-paper); }
  .tok { font-family: var(--mono); font-size: 11px; color: var(--fg); }
  .role { font-family: var(--sans); font-size: 11px; color: var(--fg-muted); margin-top: 6px; line-height: 1.45; }
  .curve { height: 26px; width: 100%; margin-top: 10px; }
  .meta { font-family: var(--mono); font-size: 10px; color: var(--fg-quiet); margin-top: 8px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item">
      <div class="tok">--ease-out</div>
      <div class="role">Primary easing. Everything entering: cards, copy, surfaces.</div>
      <svg class="curve" viewBox="0 0 100 26" preserveAspectRatio="none"><path d="M0,26 C22,26 36,4 100,0" fill="none" stroke="var(--accent)" stroke-width="1.4"/></svg>
      <div class="meta">cubic-bezier(0.22, 1, 0.36, 1)</div>
    </div>
    <div class="item">
      <div class="tok">Durations</div>
      <div class="role">140 hover · 220 default · 640 reveal · 1150 hero copy</div>
      <svg class="curve" viewBox="0 0 100 26"><line x1="2" y1="13" x2="14" y2="13" stroke="var(--accent)" stroke-width="2"/><line x1="22" y1="13" x2="40" y2="13" stroke="var(--accent)" stroke-width="2"/><line x1="48" y1="13" x2="76" y2="13" stroke="var(--accent)" stroke-width="2"/><line x1="84" y1="13" x2="98" y2="13" stroke="var(--accent)" stroke-width="2"/></svg>
      <div class="meta">prefers-reduced-motion: respected</div>
    </div>
  </div>
</body>
</html>
